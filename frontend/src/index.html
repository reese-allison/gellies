<html>
    <head>
        <script>
            // GitHub Pages SPA redirect handler
            (function(){
                var redirect = sessionStorage.redirect;
                delete sessionStorage.redirect;
                if (redirect && redirect !== location.href) {
                    var url = new URL(redirect);
                    history.replaceState(null, null, url.pathname + url.search + url.hash);
                }
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Glory:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Grandstander:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
        <meta name="viewport" content="initial-scale=1, width=device-width"/>
    </head>
    <body style="margin: 0">
        <div id="root"></div>
    </body>
</html>
