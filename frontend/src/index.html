<html>
    <head>
        <script>
            // GitHub Pages SPA redirect handler
            (function(){
                var redirect = sessionStorage.redirect;
                delete sessionStorage.redirect;
                if (redirect && redirect !== location.href) {
                    try {
                        var url = new URL(redirect);
                        // Validate that redirect is same origin to prevent open redirect attacks
                        if (url.origin === location.origin) {
                            history.replaceState(null, null, url.pathname + url.search + url.hash);
                        }
                    } catch (e) {
                        // Invalid URL, ignore
                    }
                }
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Glory:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Grandstander:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
        <meta name="viewport" content="initial-scale=1, width=device-width"/>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                background-color: #fdfadc;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
